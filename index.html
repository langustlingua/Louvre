<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ТЗ · Лувр 49 м² (профессиональная смета)</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: #2C1F14;
      background: #fff;
      -webkit-tap-highlight-color: transparent
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      border-bottom: 1px solid #E8DFD2
    }

    .budget {
      background: #2C1F14;
      padding: 10px 14px;
      padding-top: calc(10px + env(safe-area-inset-top, 0px))
    }

    .brow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px
    }

    .btitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 600;
      color: #F0E6D8;
      letter-spacing: .02em
    }

    .btitle i {
      color: #C08848;
      font-style: italic
    }

    .bpct {
      font-size: 11px;
      color: #A08060;
      letter-spacing: .04em
    }

    .bcols {
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      gap: 0
    }

    .bcol {
      padding: 0 10px
    }

    .bcol:first-child {
      padding-left: 0
    }

    .bcol:last-child {
      padding-right: 0
    }

    .bdiv {
      background: rgba(255, 255, 255, .12);
      align-self: stretch
    }

    .blabel {
      font-size: 9px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #806040;
      margin-bottom: 3px
    }

    .bval {
      font-family: 'Cormorant Garamond', serif;
      font-size: 19px;
      font-weight: 600;
      line-height: 1;
      color: #E8D8C0
    }

    .bval.amber {
      color: #C08848
    }

    .bval.green {
      color: #6A9050
    }

    .bval.red {
      color: #C05040
    }

    .bsub {
      font-size: 10px;
      color: #806040;
      margin-top: 2px
    }

    .beco {
      margin-top: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 6px
    }

    .beco.show {
      display: flex
    }

    .beco.save {
      background: rgba(106, 144, 80, .15);
      color: #8AB860
    }

    .beco.over {
      background: rgba(192, 80, 64, .12);
      color: #E07060
    }

    .beco-emoji {
      font-size: 16px;
      flex-shrink: 0
    }

    .bprog {
      height: 2px;
      background: rgba(255, 255, 255, .1);
      border-radius: 1px;
      margin-top: 8px;
      overflow: hidden
    }

    .bprog-fill {
      height: 2px;
      background: #C08848;
      border-radius: 1px;
      transition: width .3s
    }

    .bprog-fill.over {
      background: #C05040
    }

    .tabs {
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 12px;
      gap: 0;
      scrollbar-width: none;
      background: #fff
    }

    .tabs::-webkit-scrollbar {
      display: none
    }

    .tab {
      flex-shrink: 0;
      padding: 10px 14px 9px;
      font-size: 12.5px;
      color: #A08870;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 5px
    }

    .tab.on {
      color: #2C1F14;
      border-bottom-color: #C08848;
      font-weight: 500
    }

    .tab-done {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #6A9050;
      display: none;
      flex-shrink: 0
    }

    .tab.has-done .tab-done {
      display: block
    }

    .page {
      padding: 0 14px 90px
    }

    .stage {
      display: none
    }

    .stage.on {
      display: block
    }

    .stage-hero {
      padding: 18px 0 14px;
      border-bottom: 1px solid #EDE5D8;
      margin-bottom: 16px
    }

    .stage-num {
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #A08870;
      margin-bottom: 3px
    }

    .stage-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 600;
      color: #2C1F14;
      line-height: 1.1
    }

    .stage-meta {
      display: flex;
      gap: 14px;
      margin-top: 8px;
      flex-wrap: wrap
    }

    .smeta {
      font-size: 11px;
      color: #A08870
    }

    .smeta b {
      color: #2C1F14;
      font-weight: 500
    }

    .desc-card {
      background: #FAF7F2;
      border: 1px solid #EDE5D8;
      border-left: 3px solid #C08848;
      border-radius: 0 8px 8px 0;
      padding: 12px 14px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #4A3420;
      line-height: 1.6
    }

    .desc-card p+p {
      margin-top: 6px
    }

    .req-block {
      margin-bottom: 16px
    }

    .req-title {
      font-size: 10px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #A08870;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .req-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #EDE5D8
    }

    .req-list {
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .req {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      background: #fff;
      border: 1px solid #EDE5D8;
      border-radius: 8px;
      padding: 9px 11px;
      font-size: 12.5px;
      color: #2C1F14;
      transition: all .2s
    }

    .req.accepted {
      background: #F6FAF4;
      border-color: rgba(106, 144, 80, .25)
    }

    .req-icon {
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 0
    }

    .req-txt {
      flex: 1
    }

    .req-txt b {
      color: #5C3D20;
      font-weight: 500
    }

    .req-accept {
      flex-shrink: 0;
      font-size: 10px;
      color: #A08870;
      cursor: pointer;
      padding: 3px 8px;
      border: 1px solid #E0D8CC;
      border-radius: 5px;
      background: #FAF7F2;
      white-space: nowrap;
      transition: all .15s
    }

    .req-accept.done {
      background: #6A9050;
      color: #fff;
      border-color: #6A9050
    }

    .req-accept.done::after {
      content: ' ✓'
    }

    .items-block {
      margin-bottom: 16px
    }

    .item {
      background: #fff;
      border: 1px solid #EDE5D8;
      border-radius: 8px;
      margin-bottom: 6px;
      overflow: clip;
      transition: all .2s
    }

    .item.done {
      background: #F6FAF4;
      border-color: rgba(106, 144, 80, .2)
    }

    .item.done .iname {
      text-decoration: line-through;
      text-decoration-color: #CCC5B8;
      color: #A08870
    }

    .item-head {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 11px 6px
    }

    .cb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 5px;
      border: 1.5px solid #CCC5B8;
      background: #FAF7F2;
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
      margin-top: 1px;
      transition: all .15s
    }

    .cb:checked {
      background: #6A9050;
      border-color: #6A9050
    }

    .cb:checked::after {
      content: '';
      position: absolute;
      left: 5px;
      top: 1px;
      width: 7px;
      height: 10px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg)
    }

    .itext {
      flex: 1;
      min-width: 0
    }

    .iname {
      font-size: 13px;
      font-weight: 500;
      color: #2C1F14;
      line-height: 1.3
    }

    .isub {
      font-size: 11px;
      color: #A08870;
      margin-top: 1px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 8px
    }

    .isub .who {
      color: #C08848;
      font-weight: 500;
      font-size: 10px;
      background: #FDF5EC;
      padding: 1px 6px;
      border-radius: 4px;
      white-space: nowrap
    }

    .item-foot {
      display: flex;
      gap: 6px;
      padding: 0 11px 10px;
      align-items: center
    }

    .est-tag {
      font-size: 11px;
      color: #A08870;
      background: #FAF7F2;
      border: 1px solid #E0D8CC;
      border-radius: 5px;
      padding: 4px 7px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all .2s
    }

    .est-tag.overridden {
      text-decoration: line-through;
      text-decoration-color: #CCC5B8;
      color: #B0A090;
      background: #F5F2EC;
      border-style: dashed
    }

    .price-row {
      flex: 1;
      display: flex;
      align-items: center;
      background: #FAF7F2;
      border: 1.5px solid #E0D8CC;
      border-radius: 7px;
      overflow: clip;
      transition: all .2s
    }

    .price-row:focus-within {
      border-color: #C08848
    }

    .price-row.auto-filled {
      border-color: #C08848;
      background: #FFFBF5;
      animation: flash .6s ease
    }

    @keyframes flash {

      0%,
      100% {
        background: #FAF7F2
      }

      50% {
        background: #FFF3E0
      }
    }

    .price-row input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 600;
      color: #2C1F14;
      padding: 6px 3px 6px 9px;
      min-width: 0;
      -webkit-appearance: none
    }

    .price-row input::placeholder {
      color: #CCC5B8;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 400
    }

    .price-row span {
      font-size: 12px;
      color: #A08870;
      padding-right: 8px;
      flex-shrink: 0
    }

    .lnk-btn {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 7px;
      background: #FAF7F2;
      border: 1.5px solid #E0D8CC;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      cursor: pointer
    }

    .lnk-btn.has {
      background: #C08848;
      border-color: #C08848;
      font-size: 12px
    }

    .subtotal {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 11px;
      background: #FAF7F2;
      border: 1px solid #EDE5D8;
      border-radius: 8px;
      margin-top: 4px;
      margin-bottom: 4px
    }

    .st-label {
      font-size: 11px;
      color: #A08870
    }

    .st-vals {
      display: flex;
      gap: 12px;
      align-items: baseline
    }

    .st-est {
      font-size: 11px;
      color: #A08870
    }

    .st-fact {
      font-size: 14px;
      font-weight: 500;
      font-family: 'Cormorant Garamond', serif;
      color: #C08848
    }

    .custom-item {
      background: #FFFBF5;
      border: 1.5px dashed #D0C0A0;
      border-radius: 8px;
      margin-bottom: 6px;
      padding: 10px 11px;
      animation: slideIn .3s ease
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .ci-row {
      display: flex;
      gap: 8px;
      align-items: flex-start
    }

    .ci-name {
      flex: 1;
      background: #fff;
      border: 1px solid #E0D8CC;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      outline: none;
      -webkit-appearance: none
    }

    .ci-name:focus {
      border-color: #C08848
    }

    .ci-price {
      width: 100px;
      background: #fff;
      border: 1px solid #E0D8CC;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 15px;
      font-family: 'Cormorant Garamond', serif;
      outline: none;
      -webkit-appearance: none;
      text-align: right
    }

    .ci-price:focus {
      border-color: #C08848
    }

    .ci-del {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: #FFF0ED;
      border: 1px solid #F0C0B0;
      color: #C05040;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer
    }

    .ci-stage-label {
      font-size: 10px;
      color: #C08848;
      margin-bottom: 6px;
      letter-spacing: .04em;
      text-transform: uppercase
    }

    .sheet {
      position: fixed;
      inset: 0;
      z-index: 200;
      pointer-events: none;
      display: flex;
      align-items: flex-end
    }

    .sheet.on {
      pointer-events: auto
    }

    .sh-bg {
      position: absolute;
      inset: 0;
      background: rgba(20, 12, 4, .5);
      opacity: 0;
      transition: opacity .2s
    }

    .sheet.on .sh-bg {
      opacity: 1
    }

    .sh-box {
      position: relative;
      width: 100%;
      z-index: 1;
      background: #fff;
      border-radius: 18px 18px 0 0;
      padding: 16px 14px calc(env(safe-area-inset-bottom, 0px)+22px);
      transform: translateY(100%);
      transition: transform .28s cubic-bezier(.3, .7, 0, 1)
    }

    .sheet.on .sh-box {
      transform: translateY(0)
    }

    .sh-bar {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: #E0D8CC;
      margin: 0 auto 14px
    }

    .sh-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 600;
      color: #2C1F14;
      margin-bottom: 2px
    }

    .sh-sub {
      font-size: 11px;
      color: #A08870;
      margin-bottom: 12px
    }

    .sh-inp {
      width: 100%;
      padding: 12px 13px;
      background: #FAF7F2;
      border: 1.5px solid #E0D8CC;
      border-radius: 9px;
      font-size: 14px;
      color: #2C1F14;
      font-family: 'Inter', sans-serif;
      outline: none;
      -webkit-appearance: none
    }

    .sh-inp:focus {
      border-color: #C08848
    }

    .sh-inp::placeholder {
      color: #A08870
    }

    .sh-btns {
      display: flex;
      gap: 7px;
      margin-top: 9px
    }

    .sh-go {
      flex: 1;
      padding: 12px;
      background: #2C1F14;
      color: #F0E6D8;
      border: none;
      border-radius: 9px;
      font-size: 14px;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      cursor: pointer
    }

    .sh-go:disabled {
      background: #CCC5B8
    }

    .sh-ok {
      padding: 12px 16px;
      background: #FAF7F2;
      color: #2C1F14;
      border: 1.5px solid #E0D8CC;
      border-radius: 9px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      cursor: pointer
    }

    .bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 90;
      background: rgba(255, 255, 255, .97);
      border-top: 1px solid #EDE5D8;
      padding: 7px 12px calc(env(safe-area-inset-bottom, 0px)+7px);
      display: flex;
      gap: 7px
    }

    .bar button {
      padding: 11px;
      border-radius: 9px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      cursor: pointer;
      border: none
    }

    .bar-g {
      flex: 1;
      background: #FAF7F2;
      border: 1px solid #E0D8CC !important;
      color: #8C7860
    }

    .bar-add {
      flex: 1;
      background: #F0E6D8;
      border: 1px solid #D0C0A0 !important;
      color: #5C3D20;
      font-weight: 500
    }

    .bar-p {
      flex: 2;
      background: #2C1F14;
      color: #F0E6D8;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .03em
    }
  </style>
</head>

<body>
  <div class="top">
    <div class="budget">
      <div class="brow">
        <div class="btitle">Лувр <i>49 м²</i> · Профессиональная смета</div>
        <div class="bpct" id="bPct">0% выполнено</div>
      </div>
      <div class="bcols">
        <div class="bcol">
          <div class="blabel">Прогноз (смета)</div>
          <div class="bval amber" id="bEst">0 ₽</div>
          <div class="bsub">с резервом 5%</div>
        </div>
        <div class="bdiv"></div>
        <div class="bcol">
          <div class="blabel">Факт (внесено)</div>
          <div class="bval green" id="bFact">0 ₽</div>
          <div class="bsub" id="bDelta">остаток: 0 ₽</div>
        </div>
      </div>
      <div class="beco" id="bEco"><span class="beco-emoji" id="bEcoEmoji"></span><span id="bEcoText"></span></div>
      <div class="bprog">
        <div class="bprog-fill" id="bFill" style="width:0%"></div>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="page" id="page"></div>

  <div class="sheet" id="sheet">
    <div class="sh-bg" onclick="closeSheet()"></div>
    <div class="sh-box">
      <div class="sh-bar"></div>
      <div class="sh-name" id="shN">—</div>
      <div class="sh-sub" id="shS"></div><input class="sh-inp" id="shI" type="url" placeholder="https://leroymerlin.ru/..." inputmode="url" oninput="shTyping()">
      <div class="sh-btns">
        <button class="sh-go" id="shGo" onclick="shOpen()" disabled>Открыть ↗</button><button class="sh-ok" onclick="closeSheet()">Готово</button>
      </div>
    </div>
  </div>

  <div class="bar">
    <button class="bar-g" onclick="clearAll()">Сбросить</button>
    <button class="bar-add" onclick="addCustomItem()">+ Добавить</button>
    <button class="bar-p" onclick="window.print()">Экспорт PDF</button>
  </div>

  <script>
    (function(){
const SK='tz_lv4_pro';
let st={},shId=null,curTab=0,customItems=[];
try{const r=localStorage.getItem(SK);if(r){const p=JSON.parse(r);st=p.st||{};customItems=p.ci||[]}}catch(e){}
const sv=()=>{try{localStorage.setItem(SK,JSON.stringify({st,ci:customItems}))}catch(e){}};
const g=id=>st[id]||{p:'',l:'',d:false,ra:false};
const set=(id,k,v)=>{if(!st[id])st[id]={};st[id][k]=v;sv()};
const fm=n=>n?n.toLocaleString('ru-RU')+' ₽':'—';
const px=v=>{const n=parseFloat((v||'').replace(/[^\d.]/g,''));return isNaN(n)?0:Math.round(n)};

const STAGES = [
  {id:'prep',num:'01',icon:'📐',title:'Подготовка и демонтаж',duration:'1–3 дня',budget_est:0,
   desc:'Осмотр квартиры, замеры, фиксация состояния предчистовой отделки. Заказ замерщиков кухни и шкафа-купе. Составление очерёдности бригад.',
   reqs:[{icon:'📏',text:'Замеры всех комнат с точностью до 1 см. Фото каждой стены до начала работ.'},{icon:'💡',text:'Проверить расположение электрощитка, точек вывода под розетки и свет.'},{icon:'🚿',text:'Проверить точки вывода сантехники: соответствие плану, высоты, диаметры труб.'},{icon:'📋',text:'Заказать замерщика кухни и шкафа-купе. Бесплатно у большинства производителей.'},{icon:'⚠️',text:'Зафиксировать все трещины, неровности, проблемные места — фото + видео.'}],
   items:[]},

const BUDGET=1000000;
const EST_TOTAL=STAGES.reduce((s,st)=>s+st.budget_est,0);

function build(){
  const tabs=document.getElementById('tabs');
  const page=document.getElementById('page');
  STAGES.forEach((stage,idx)=>{
    const tab=document.createElement('div');
    tab.className='tab'+(idx===0?' on':'');
    tab.id='tab_'+stage.id;
    tab.innerHTML=`${stage.icon} ${stage.num}<div class="tab-done"></div>`;
    tab.title=stage.title;
    tab.onclick=()=>switchTab(idx);
    tabs.appendChild(tab);

    const panel=document.createElement('div');
    panel.className='stage'+(idx===0?' on':'');
    panel.id='st_'+stage.id;
    let html=`
      <div class="stage-hero"><div class="stage-num">${stage.icon} ЭТАП ${stage.num}</div><div class="stage-title">${stage.title}</div><div class="stage-meta"><div class="smeta">⏱ <b>${stage.duration}</b></div>${stage.budget_est>0?`<div class="smeta">📋 смета: <b>${stage.budget_est.toLocaleString('ru-RU')} ₽</b></div>`:''}</div></div>
      <div class="desc-card"><p>${stage.desc}</p></div>`;

    if(stage.reqs.length){
      html+=`<div class="req-block"><div class="req-title">Требования к качеству</div><div class="req-list">`;
      stage.reqs.forEach((r,ri)=>{
        const reqId=`req_${stage.id}_${ri}`;
        const saved=g(reqId);
        html+=`<div class="req${saved.ra?' accepted':''}" id="${reqId}"><div class="req-icon">${r.icon}</div><div class="req-txt">${r.text}</div><div class="req-accept${saved.ra?' done':''}" onclick="toggleReq('${reqId}')">${saved.ra?'Принято':'Принять'}</div></div>`;
      });
      html+=`</div></div>`;
    }

    html+=`<div class="items-block" id="items_${stage.id}"><div class="req-title">Материалы и позиции</div>`;
    stage.items.forEach(item=>{
      const saved=g(item.id);
      html+=`
        <div class="item${saved.d?' done':''}" id="it_${item.id}">
          <div class="item-head"><input type="checkbox" class="cb" id="cb_${item.id}" ${saved.d?'checked':''}><div class="itext"><div class="iname">${item.name}</div><div class="isub">${item.sub} <span class="who">👤 ${item.who||'—'}</span></div></div></div>
          <div class="item-foot"><div class="est-tag" id="esttag_${item.id}">~${item.est.toLocaleString('ru-RU')} ₽</div><div class="price-row" id="pr_${item.id}"><input type="number" id="px_${item.id}" value="${saved.p||''}" placeholder="${item.est}" inputmode="decimal" oninput="onP('${item.id}',this.value,${item.est})"><span>₽</span></div><div class="lnk-btn${saved.l?' has':''}" id="lk_${item.id}" onclick="openSheet('${item.id}')">${saved.l?'↗':'🔗'}</div></div>
        </div>`;
    });

    const estTotal=stage.items.reduce((s,i)=>s+i.est,0);
    html+=`<div class="subtotal"><div class="st-label">Итого по этапу</div><div class="st-vals"><div class="st-est">смета: ${estTotal.toLocaleString('ru-RU')} ₽</div><div class="st-fact" id="sf_${stage.id}">факт: —</div></div></div><div id="custom_${stage.id}"></div></div>`;

    panel.innerHTML=html;
    page.appendChild(panel);

    setTimeout(()=>{
      stage.items.forEach(item=>{
        const cb=document.getElementById('cb_'+item.id);
        if(!cb)return;
        cb.addEventListener('change',function(){
          const checked=this.checked;
          set(item.id,'d',checked);
          const el=document.getElementById('it_'+item.id);
          if(el)el.classList.toggle('done',checked);
          if(checked){
            const inp=document.getElementById('px_'+item.id);
            const saved=g(item.id);
            if(!saved.p||px(saved.p)===0){
              const av=item.est.toString();
              inp.value=av;
              set(item.id,'p',av);
              const pr=document.getElementById('pr_'+item.id);
              if(pr){pr.classList.add('auto-filled');setTimeout(()=>pr.classList.remove('auto-filled'),600)}
              onP(item.id,av,item.est);
            }
          }
          recalc();
        });
      });
      renderCustomItems(stage.id);
    },0);
  });
  document.getElementById('bEst').textContent=fm(EST_TOTAL);
}

function switchTab(idx){
  curTab=idx;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===idx));
  document.querySelectorAll('.stage').forEach((s,i)=>s.classList.toggle('on',i===idx));
  const tab=document.getElementById('tab_'+STAGES[idx].id);
  if(tab)tab.scrollIntoView({inline:'center',block:'nearest'});
  window.scrollTo({top:0,behavior:'smooth'});
}

function onP(id,v,est){set(id,'p',v);const p=px(v);const et=document.getElementById('esttag_'+id);if(et)et.classList.toggle('overridden',p>0);recalc()}

window.toggleReq=function(reqId){
  const saved=g(reqId);const nv=!saved.ra;set(reqId,'ra',nv);
  const el=document.getElementById(reqId);if(el){el.classList.toggle('accepted',nv);const b=el.querySelector('.req-accept');if(b){b.className='req-accept'+(nv?' done':'');b.textContent=nv?'Принято':'Принять'}}
};

window.addCustomItem=function(){
  const stage=STAGES[curTab];const id='cust_'+Date.now();
  customItems.push({id,stageId:stage.id,name:'',price:''});sv();renderCustomItems(stage.id);
  setTimeout(()=>{const el=document.getElementById(id);if(el)el.scrollIntoView({block:'center',behavior:'smooth'});const inp=document.getElementById('cin_'+id);if(inp)inp.focus()},200);
};

window.renderCustomItems=function(sid){
  const c=document.getElementById('custom_'+sid);if(!c)return;
  const items=customItems.filter(ci=>ci.stageId===sid);
  if(!items.length){c.innerHTML='';return}
  let h='<div class="req-title" style="margin-top:12px">🛠️ Свои позиции</div>';
  items.forEach(ci=>{h+=`<div class="custom-item" id="${ci.id}"><div class="ci-stage-label">добавлено вручную</div><div class="ci-row"><input class="ci-name" id="cin_${ci.id}" value="${escHtml(ci.name)}" placeholder="Название позиции" oninput="updateCustom('${ci.id}','name',this.value)"><input class="ci-price" id="cip_${ci.id}" value="${ci.price}" placeholder="0" inputmode="decimal" oninput="updateCustom('${ci.id}','price',this.value)"><button class="ci-del" onclick="deleteCustom('${ci.id}')">✕</button></div></div>`});
  c.innerHTML=h;
};

function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

window.updateCustom=function(id,f,v){const i=customItems.findIndex(ci=>ci.id===id);if(i===-1)return;customItems[i][f]=v;sv();recalc()};
window.deleteCustom=function(id){customItems=customItems.filter(ci=>ci.id!==id);sv();renderCustomItems(STAGES[curTab].id);recalc()};

window.openSheet=function(id){shId=id;let item=null;STAGES.forEach(s=>s.items.forEach(i=>{if(i.id===id)item=i}));const saved=g(id);document.getElementById('shN').textContent=item?.name||'—';document.getElementById('shS').textContent=item?.sub||'';const inp=document.getElementById('shI');inp.value=saved.l||'';shTyping();document.getElementById('sheet').classList.add('on');setTimeout(()=>inp.focus(),300)};
window.closeSheet=function(){const id=shId;if(id){const v=document.getElementById('shI').value.trim();set(id,'l',v);const lk=document.getElementById('lk_'+id);if(lk){lk.className='lnk-btn'+(v?' has':'');lk.textContent=v?'↗':'🔗'}}document.getElementById('sheet').classList.remove('on');shId=null};
window.shTyping=function(){document.getElementById('shGo').disabled=!document.getElementById('shI').value.trim()};
window.shOpen=function(){const v=document.getElementById('shI').value.trim();if(v)window.open(v,'_blank','noopener')};

function recalc(){
  let ft=0,dt=0,at=0;
  STAGES.forEach(stage=>{
    let sf=0,sd=0;
    stage.items.forEach(item=>{at++;const s=g(item.id);const p=px(s.p);if(p>0)sf+=p;if(s.d)sd++});
    const cis=customItems.filter(ci=>ci.stageId===stage.id);
    cis.forEach(ci=>{at++;const p=px(ci.price);if(p>0){sf+=p;sd++}});
    ft+=sf;dt+=sd;
    const se=document.getElementById('sf_'+stage.id);if(se)se.textContent=sf>0?'факт: '+fm(sf):'факт: —';
    const tab=document.getElementById('tab_'+stage.id);if(tab)tab.classList.toggle('has-done',(stage.items.length+cis.length)>0&&sd>0);
  });

  const over=ft>BUDGET;
  const bl=BUDGET-ft;
  const ed=ft-EST_TOTAL;
  const pct=at>0?Math.round(dt/at*100):0;

  document.getElementById('bFact').textContent=ft>0?fm(ft):'0 ₽';
  document.getElementById('bFact').className='bval'+(over?' red':ft>0?' amber':' green');
  document.getElementById('bDelta').textContent=over?`перерасход: ${fm(Math.abs(bl))}`:`остаток: ${fm(bl)}`;
  document.getElementById('bDelta').style.color=over?'#C07060':'';
  document.getElementById('bPct').textContent=pct+'% выполнено';
  document.getElementById('bFill').style.width=Math.min(ft/BUDGET*100,100).toFixed(1)+'%';
  document.getElementById('bFill').className='bprog-fill'+(over?' over':'');

  const eco=document.getElementById('bEco');
  if(ed>0){eco.className='beco over show';document.getElementById('bEcoEmoji').textContent='⚠️';document.getElementById('bEcoText').textContent=`Перерасход к смете: +${fm(ed)} — проверьте позиции`}
  else if(ed<0&&ft>0){eco.className='beco save show';document.getElementById('bEcoEmoji').textContent='🎉';document.getElementById('bEcoText').textContent=`Экономия к смете: ${fm(Math.abs(ed))} — отлично!`}
  else{eco.className='beco'}
}

window.clearAll=function(){if(!confirm('Сбросить всё?'))return;localStorage.removeItem(SK);st={};customItems=[];location.reload()};
build();recalc();
})();
  </script>
